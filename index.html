<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPoupar \u2014 Descobre Quanto Podes Poupar Hoje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b12;
  --surface: #0d1522;
  --surface2: #121c2e;
  --surface3: #1a2540;
  --border: rgba(255,255,255,0.07);
  --gold: #f0b429;
  --gold2: #ffd166;
  --teal: #00d4aa;
  --teal2: #00f5c4;
  --text: #e8edf6;
  --muted: #5e6e8a;
  --energy: #f77f00;
  --telco: #0096c7;
  --green: #25d366;
  --r: 14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* BG */
.bg-mesh{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 90% 50% at 5% -5%,rgba(0,212,170,.055) 0%,transparent 55%),
    radial-gradient(ellipse 60% 45% at 95% 105%,rgba(240,180,41,.065) 0%,transparent 55%),
    radial-gradient(ellipse 50% 30% at 50% 45%,rgba(0,150,199,.035) 0%,transparent 65%);}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 36px;
  background:rgba(7,11,18,.88);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.18rem;letter-spacing:-.03em;}
.logo em{color:var(--gold);font-style:normal;}
.logo sup{color:var(--teal);font-size:.55rem;vertical-align:super;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-tel{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:6px;}
.hdr-tel a{color:var(--teal);text-decoration:none;font-weight:600;}
.badge-ai{font-size:.6rem;color:var(--muted);border:1px solid var(--border);
  padding:3px 8px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase;}
.badge-ai b{color:var(--teal);}

/* HERO */
.hero{position:relative;z-index:1;padding:120px 32px 50px;text-align:center;max-width:780px;margin:0 auto;}
.hero-pill{display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,212,170,.07);border:1px solid rgba(0,212,170,.18);
  padding:6px 16px;border-radius:40px;font-size:.72rem;color:var(--teal);
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:24px;
  animation:fadeUp .55s ease both;}
.pulse{width:7px;height:7px;background:var(--teal);border-radius:50%;animation:blink 1.5s ease infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.6)}}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,5.5vw,3.6rem);font-weight:800;
  line-height:1.06;letter-spacing:-.035em;margin-bottom:18px;animation:fadeUp .55s .1s ease both;}
.hl{background:linear-gradient(120deg,var(--gold),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{font-size:1rem;color:var(--muted);line-height:1.7;max-width:500px;margin:0 auto 32px;animation:fadeUp .55s .2s ease both;}
.hero-stats{display:flex;gap:28px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;animation:fadeUp .55s .3s ease both;}
.stat .val{font-family:'Syne',sans-serif;font-size:1.65rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat .lbl{font-size:.72rem;color:var(--muted);margin-top:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   SLIDESHOW COMPONENT (reusable)
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.slideshow-section{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 20px 56px;}
.section-eyebrow{font-size:.68rem;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;
  text-align:center;margin-bottom:10px;}
.section-title{font-family:'Syne',sans-serif;font-size:clamp(1.25rem,3vw,1.7rem);font-weight:800;
  text-align:center;letter-spacing:-.025em;margin-bottom:32px;}

.slideshow{position:relative;overflow:hidden;border-radius:20px;
  border:1px solid var(--border);
  box-shadow:0 24px 60px rgba(0,0,0,.45);}
.slides-track{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.slide{min-width:100%;flex-shrink:0;}

/* Slide: WHY SWITCH */
.slide-why{
  background:var(--surface);
  padding:36px 40px;}
.slide-why .slide-tag{font-size:.65rem;color:var(--gold);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.slide-why h3{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:10px;letter-spacing:-.02em;}
.slide-why p{font-size:.88rem;color:var(--muted);line-height:1.65;margin-bottom:24px;}
.before-after{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;}
.ba-box{background:var(--surface2);border-radius:12px;padding:16px;text-align:center;}
.ba-box.after{border:1.5px solid var(--teal);}
.ba-label{font-size:.65rem;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.ba-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;}
.ba-val.bad{color:#ff6b6b;}.ba-val.good{color:var(--teal);}
.ba-arrow{font-size:1.4rem;color:var(--gold);}

/* Slide: OPERATORS */
.slide-ops{background:var(--surface);padding:32px 36px;}
.slide-ops h3{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:8px;letter-spacing:-.02em;}
.slide-ops .sub{font-size:.83rem;color:var(--muted);margin-bottom:20px;}
.op-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.op-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  padding:14px 12px;text-align:center;transition:border-color .2s;}
.op-card:hover{border-color:rgba(255,255,255,.2);}
.op-em{font-size:1.5rem;margin-bottom:6px;}
.op-name{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;}
.op-save{font-size:.7rem;color:var(--teal);margin-top:3px;}

/* Slide: HOW IT WORKS */
.slide-how{background:var(--surface);padding:34px 38px;}
.slide-how h3{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:20px;letter-spacing:-.02em;}
.steps-flow{display:flex;flex-direction:column;gap:14px;}
.flow-step{display:flex;align-items:flex-start;gap:14px;}
.flow-num{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--teal),#00b894);
  color:#070b12;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;margin-top:1px;}
.flow-text .ft{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:2px;}
.flow-text .fs{font-size:.78rem;color:var(--muted);line-height:1.4;}

/* Slide: TESTIMONIALS CAROUSEL */
.slide-testi{background:var(--surface);padding:32px 36px;}
.slide-testi h3{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:20px;letter-spacing:-.02em;}
.testi-inner{position:relative;overflow:hidden;min-height:140px;}
.testi-slides{display:flex;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.testi-slide{min-width:100%;flex-shrink:0;}
.testi-stars{color:var(--gold);font-size:.9rem;margin-bottom:10px;letter-spacing:2px;}
.testi-quote{font-size:.92rem;line-height:1.65;color:var(--text);margin-bottom:14px;font-style:italic;}
.testi-meta{display:flex;align-items:center;justify-content:space-between;}
.testi-who .tn{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;}
.testi-who .tl{font-size:.72rem;color:var(--muted);}
.testi-saving{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--teal);}

/* Slide: URGENCY / PROMO */
.slide-promo{
  background:linear-gradient(135deg,#0d2218 0%,#081824 100%);
  border:1px solid rgba(0,212,170,.15);
  padding:36px 40px;text-align:center;}
.promo-badge{display:inline-flex;align-items:center;gap:8px;
  background:rgba(240,180,41,.1);border:1px solid rgba(240,180,41,.25);
  color:var(--gold);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;
  padding:5px 14px;border-radius:20px;margin-bottom:18px;}
.promo-h{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:10px;letter-spacing:-.025em;}
.promo-sub{font-size:.88rem;color:var(--muted);line-height:1.6;margin-bottom:24px;}
.promo-counter{display:flex;gap:12px;justify-content:center;margin-bottom:24px;}
.count-box{background:var(--surface3);border:1px solid var(--border);border-radius:10px;
  padding:12px 16px;min-width:60px;text-align:center;}
.count-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;}
.count-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;}

/* Slide: SAVINGS CALCULATOR PREVIEW */
.slide-calc{background:var(--surface);padding:34px 38px;}
.slide-calc h3{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:6px;}
.slide-calc .sub{font-size:.83rem;color:var(--muted);margin-bottom:20px;}
.calc-visual{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.calc-col{background:var(--surface2);border-radius:12px;padding:16px;}
.calc-col-lbl{font-size:.66rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.calc-item{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem;}
.calc-item:last-child{border:none;}
.calc-item .ci-name{color:var(--muted);}
.calc-item .ci-val{font-family:'Syne',sans-serif;font-weight:700;}
.calc-item .ci-val.red{color:#ff6b6b;}
.calc-item .ci-val.green{color:var(--teal);}
.calc-total{text-align:center;margin-top:4px;
  font-size:.82rem;color:var(--muted);}
.calc-total b{font-family:'Syne',sans-serif;font-size:1.2rem;color:var(--gold);}

/* \u2500\u2500 SLIDESHOW CONTROLS \u2500\u2500 */
.ss-controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;}
.ss-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.8rem;
  transition:all .2s;}
.ss-btn:hover{border-color:var(--teal);color:var(--teal);}
.ss-dots{display:flex;gap:6px;}
.ss-dot{width:7px;height:7px;border-radius:50%;background:var(--border);
  cursor:pointer;transition:all .25s;}
.ss-dot.active{background:var(--teal);width:20px;border-radius:4px;}
.ss-progress{position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--teal),var(--gold));
  transition:width .1s linear;}

/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
   FUNNEL CARD
\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */
.funnel-wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 20px 70px;}
.funnel-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;
  overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.5);}
.progress-track{height:3px;background:var(--surface2);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .45s cubic-bezier(.4,0,.2,1);}
.funnel-hdr{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between;}
.step-lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.step-pct{font-family:'Syne',sans-serif;font-size:.82rem;color:var(--muted);}
.step-pct b{color:var(--text);}
.funnel-body{padding:24px 28px 28px;}
.fstep{display:none;}
.fstep.active{display:block;animation:stepIn .32s ease both;}
@keyframes stepIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.fstep h2{font-family:'Syne',sans-serif;font-size:1.28rem;font-weight:800;margin-bottom:5px;letter-spacing:-.02em;}
.fstep .sub{font-size:.85rem;color:var(--muted);margin-bottom:20px;line-height:1.55;}

/* Choices */
.choices{display:grid;gap:10px;}
.choices.c2{grid-template-columns:1fr 1fr;}
.choice{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r);
  padding:18px 16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:flex-start;gap:7px;}
.choice:hover{border-color:rgba(255,255,255,.18);transform:translateY(-2px);}
.choice.sel-energy{border-color:var(--energy);background:rgba(247,127,0,.07);}
.choice.sel-telco{border-color:var(--telco);background:rgba(0,150,199,.07);}
.choice.sel{border-color:var(--teal);background:rgba(0,212,170,.07);}
.c-icon{font-size:1.7rem;}
.c-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;}
.c-sub{font-size:.74rem;color:var(--muted);line-height:1.4;}
.c-badge{font-size:.62rem;font-weight:600;padding:2px 8px;border-radius:20px;
  background:rgba(240,180,41,.12);color:var(--gold);}

/* Input / Select */
.ig{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.ig label{font-size:.72rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
.ig input,.ig select{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;
  padding:13px 15px;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);outline:none;
  transition:border-color .2s;width:100%;}
.ig input:focus,.ig select:focus{border-color:var(--teal);}
.ig select option{background:#121c2e;}

/* Range */
.range-wrap{margin:18px 0;}
.range-lbl-row{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-bottom:6px;}
.range-big{text-align:center;font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;
  background:linear-gradient(135deg,var(--gold2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;background:var(--surface2);border-radius:3px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--teal));cursor:pointer;
  border:3px solid var(--bg);box-shadow:0 0 10px rgba(0,212,170,.4);}

/* Check */
.check-list{display:flex;flex-direction:column;gap:9px;}
.check-item{display:flex;align-items:
